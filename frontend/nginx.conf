# =============================================================================
# nginx.conf — Production config for the React SPA
# =============================================================================

# Run as non-root user (matches the nginx:alpine image default)
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ──────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    # ─── Performance ──────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen       80;
        listen  [::]:80;
        server_name  _;
        root         /usr/share/nginx/html;
        index        index.html;

        # ─── Security Headers ──────────────────────────────────
        add_header X-Frame-Options           "SAMEORIGIN"            always;
        add_header X-Content-Type-Options    "nosniff"               always;
        add_header X-XSS-Protection          "1; mode=block"         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

        # ─── Cache Static Assets ───────────────────────────────
        # Vite fingerprints assets with content hashes — cache forever
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
        }

        # ─── SPA Fallback ──────────────────────────────────────
        # Serve index.html for all non-asset routes (client-side routing)
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ─── Health Probe ──────────────────────────────────────
        location /nginx-health {
            access_log  off;
            return      200 "healthy\n";
            add_header  Content-Type text/plain;
        }

        # ─── Hide Nginx Version ────────────────────────────────
        server_tokens off;
    }
}
