# =============================================================================
# azure-pipelines.yml — Single pipeline, build once, deploy everywhere
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │  TRIGGER        FLOW                                                    │
# │  PR             Validate only (lint + test) — NO build, NO deploy       │
# │  develop        Validate → Build&Push → Deploy DEV → Smoke DEV          │
# │  release/*      Validate → Build&Push → Deploy QA → Smoke QA → UAT     │
# │                                        → Smoke UAT                      │
# │  main           Validate → Build&Push → Deploy STAGE ✋→ Smoke STAGE    │
# │                                        → Deploy PROD ✋                  │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Image tag: $(Build.BuildId) — immutable, built once per pipeline run.
# Manual approvals: configured on 'stage' and 'prod' Environments in Azure DevOps UI.
# Post-deploy validation runs for ALL environments (DEV, QA, UAT, STAGE).
# =============================================================================

# ── CI Triggers ──────────────────────────────────────────────────────────────
trigger:
  branches:
    include:
      - develop       # Primary integration branch — triggers DEV deployment
      - release/*     # Wildcard: matches release/1.0, release/2.1, etc. → QA + UAT
      - main          # Production branch → STAGE (✋) + PROD (✋)
  paths:
    exclude:
      - '*.md'
      - '.gitignore'
      - 'docs/**'         # Documentation — no pipeline impact
      - 'terraform/**'    # Infrastructure-as-Code — managed separately
      - '.azure/**'       # Azure DevOps config files — pipeline-safe to ignore
      - '.github/**'      # GitHub config files (Actions, CODEOWNERS, etc.)

# ── PR Validation Trigger ─────────────────────────────────────────────────────
# PRs into develop, release/*, or main run Validate stage only.
# No Docker build, no deployment — gate quality before merge.
pr:
  branches:
    include:
      - develop
      - release/*
      - main
  paths:
    exclude:
      - '*.md'
      - '.gitignore'
      - 'docs/**'
      - 'terraform/**'
      - '.azure/**'
      - '.github/**'

# ── Agent Pool ────────────────────────────────────────────────────────────────
pool:
  vmImage: 'ubuntu-latest' # Use Self-Hosted pool for production to reduce costs

# ── Pipeline Variables ────────────────────────────────────────────────────────
variables:
  # Immutable image tag — Build.BuildId is unique per pipeline run
  - name: tag
    value: '$(Build.BuildId)'

  # ── Variable Groups ─────────────────────────────────────────────────────────
  # Variable groups are defined in Azure DevOps → Pipelines → Library.
  # Each group holds environment-specific secrets and config values:
  #   dev-vars     → DEV Docker Hub service connection, API URL, server URLs
  #   qa-vars      → QA  Docker Hub service connection, API URL, server URLs
  #   release-vars → UAT Docker Hub service connection, API URL, server URLs
  #   prod-vars    → PROD Docker Hub service connection, API URL, server URLs
  #
  # Each group should define at minimum:
  #   dockerHubConnection  — name of the Docker Registry Service Connection
  #   VITE_API_URL         — backend API URL baked into the Vite JS bundle
  #   FRONTEND_URL         — deployed frontend URL (for health checks + DAST)
  #   BACKEND_URL          — deployed backend URL  (for health checks)
  - group: dev-vars
  - group: qa-vars
  - group: release-vars
  - group: prod-vars

  # Docker Hub image names (same image, different tags per run)
  - name: frontendImage
    value: 'saksheezala/app-frontend'
  - name: backendImage
    value: 'saksheezala/app-backend'

# =============================================================================
# STAGES
# =============================================================================
stages:

  # ── Stage 1: Validate ────────────────────────────────────────────────────
  # Runs on ALL triggers including PRs.
  # Lint + Test both frontend and backend in parallel.
  # If this fails, the entire pipeline stops — nothing deploys.
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Validate
    displayName: '🔍 Validate — Lint + Test'
    jobs:
      - template: templates/validate.yml
        parameters:
          frontendDir: 'frontend'
          backendDir: 'backend'

  # ── Stage 2: Build & Push Docker Images ──────────────────────────────────
  # Skipped for PRs (ne Build.Reason PullRequest).
  # Builds BOTH images with Build.BuildId tag — this same tag flows
  # through all subsequent deploy stages on this pipeline run.
  # Includes Trivy image scanning for HIGH/CRITICAL CVEs before push.
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Build_and_Push
    displayName: '🐳 Build & Push — $(Build.BuildId)'
    dependsOn: Validate
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:
      - template: templates/docker-build-push.yml
        parameters:
          frontendImage: '$(frontendImage)'
          backendImage: '$(backendImage)'
          tag: '$(tag)'
          # Dynamic service connection — resolved from the active variable group.
          # On develop: dev-vars.dockerHubConnection
          # On release/*: qa-vars.dockerHubConnection
          # On main: prod-vars.dockerHubConnection
          dockerHubConnection: '$(dockerHubConnection)'
          viteApiUrl: '$(VITE_API_URL)'

  # ── Stage 3: Deploy → DEV ────────────────────────────────────────────────
  # Runs only on the develop branch.
  # No manual approval — auto-deploys on every push to develop.
  # DEV environment is configured in Azure DevOps Environments with NO approval gate.
  # Includes post-deploy health check and OWASP ZAP DAST on the frontend.
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Deploy_DEV
    displayName: '🚀 Deploy → DEV'
    dependsOn: Build_and_Push
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest'),
        eq(variables['Build.SourceBranch'], 'refs/heads/develop')
      )
    jobs:
      - template: templates/deploy.yml
        parameters:
          environmentName: 'dev'
          displayName: 'DEV'
          frontendImage: '$(frontendImage)'
          backendImage: '$(backendImage)'
          tag: '$(tag)'
          frontendUrl: '$(FRONTEND_URL)'
          backendUrl: '$(BACKEND_URL)'
          deploymentValidation: true
          runDAST: true

  # ── Stage 4: Post-Deploy Smoke Tests (DEV) ───────────────────────────────
  # Runs after successful DEV deployment on develop branch.
  # If smoke tests FAIL → pipeline stops (no further stages on this run).
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Post_Deploy_DEV_Validate
    displayName: '🧪 Smoke Tests — DEV'
    dependsOn: Deploy_DEV
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/develop')
      )
    jobs:
      - template: templates/post-deploy-validate.yml
        parameters:
          environment: 'DEV'
          backendUrl: '$(BACKEND_URL)'
          frontendUrl: '$(FRONTEND_URL)'

  # ── Stage 5: Deploy → QA ─────────────────────────────────────────────────
  # Runs only on release/* branches.
  # No approval — auto-deploys. Smoke tests run AFTER in Stage 6.
  # QA environment is configured in Azure DevOps Environments with NO approval gate.
  # Dynamic service connection: qa-vars.dockerHubConnection from variable group.
  # Includes post-deploy health check and OWASP ZAP DAST.
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Deploy_QA
    displayName: '🚀 Deploy → QA'
    dependsOn: Build_and_Push
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest'),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')
      )
    jobs:
      - template: templates/deploy.yml
        parameters:
          environmentName: 'qa'
          displayName: 'QA'
          frontendImage: '$(frontendImage)'
          backendImage: '$(backendImage)'
          tag: '$(tag)'
          frontendUrl: '$(FRONTEND_URL)'
          backendUrl: '$(BACKEND_URL)'
          deploymentValidation: true
          runDAST: true

  # ── Stage 6: Post-Deploy Smoke Tests (QA) ────────────────────────────────
  # Runs only after successful QA deployment on release/* branch.
  # If smoke tests FAIL → UAT is blocked. Fix QA first.
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Post_Deploy_QA_Validate
    displayName: '🧪 Smoke Tests — QA'
    dependsOn: Deploy_QA
    condition: |
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')
      )
    jobs:
      - template: templates/post-deploy-validate.yml
        parameters:
          environment: 'QA'
          backendUrl: '$(BACKEND_URL)'
          frontendUrl: '$(FRONTEND_URL)'

  # ── Stage 7: Deploy → UAT ────────────────────────────────────────────────
  # Runs only after smoke tests pass on release/* branch.
  # Same Build.BuildId tag as QA — same image, no rebuild.
  # No approval — auto-deploys after passing QA validation.
  # Includes post-deploy health check (DAST not run on UAT — covered by QA).
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Deploy_UAT
    displayName: '🚀 Deploy → UAT'
    dependsOn: Post_Deploy_QA_Validate
    condition: |
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')
      )
    jobs:
      - template: templates/deploy.yml
        parameters:
          environmentName: 'uat'
          displayName: 'UAT'
          frontendImage: '$(frontendImage)'
          backendImage: '$(backendImage)'
          tag: '$(tag)'
          frontendUrl: '$(FRONTEND_URL)'
          backendUrl: '$(BACKEND_URL)'
          deploymentValidation: true
          runDAST: false

  # ── Stage 8: Post-Deploy Smoke Tests (UAT) ───────────────────────────────
  # Runs after successful UAT deployment on release/* branch.
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Post_Deploy_UAT_Validate
    displayName: '🧪 Smoke Tests — UAT'
    dependsOn: Deploy_UAT
    condition: |
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/heads/release/')
      )
    jobs:
      - template: templates/post-deploy-validate.yml
        parameters:
          environment: 'UAT'
          backendUrl: '$(BACKEND_URL)'
          frontendUrl: '$(FRONTEND_URL)'

  # ── Stage 9: Deploy → STAGE ──────────────────────────────────────────────
  # Runs only on main branch.
  # ✋ MANUAL APPROVAL REQUIRED — configured on 'stage' Environment in Azure DevOps.
  #    Pipeline pauses here and notifies approvers. Resumes only after approval.
  # Includes post-deploy health check after approval + deployment.
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Deploy_STAGE
    displayName: '✋ Deploy → STAGE (Approval Required)'
    dependsOn: Build_and_Push
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest'),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - template: templates/deploy.yml
        parameters:
          environmentName: 'stage'
          displayName: 'STAGE'
          frontendImage: '$(frontendImage)'
          backendImage: '$(backendImage)'
          tag: '$(tag)'
          frontendUrl: '$(FRONTEND_URL)'
          backendUrl: '$(BACKEND_URL)'
          deploymentValidation: true
          runDAST: false

  # ── Stage 10: Post-Deploy Smoke Tests (STAGE) ────────────────────────────
  # Runs after successful STAGE deployment on main branch.
  # If smoke tests FAIL → PROD is blocked.
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Post_Deploy_STAGE_Validate
    displayName: '🧪 Smoke Tests — STAGE'
    dependsOn: Deploy_STAGE
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - template: templates/post-deploy-validate.yml
        parameters:
          environment: 'STAGE'
          backendUrl: '$(BACKEND_URL)'
          frontendUrl: '$(FRONTEND_URL)'

  # ── Stage 11: Deploy → PROD ──────────────────────────────────────────────
  # Runs only after STAGE smoke tests pass on main branch.
  # ✋ MANUAL APPROVAL REQUIRED — configured on 'prod' Environment in Azure DevOps.
  # PROD has dedicated, isolated infrastructure (per project constraint).
  # Same Build.BuildId tag as STAGE — guaranteed byte-for-byte identical image.
  # Blue-Green for Backend / Canary for Frontend (configured in Azure Web App slots).
  # ─────────────────────────────────────────────────────────────────────────
  - stage: Deploy_PROD
    displayName: '✋ Deploy → PROD (Approval Required)'
    dependsOn: Post_Deploy_STAGE_Validate
    condition: |
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main')
      )
    jobs:
      - template: templates/deploy.yml
        parameters:
          environmentName: 'prod'
          displayName: 'PROD'
          frontendImage: '$(frontendImage)'
          backendImage: '$(backendImage)'
          tag: '$(tag)'
          frontendUrl: '$(FRONTEND_URL)'
          backendUrl: '$(BACKEND_URL)'
          deploymentValidation: false  # PROD health validated by STAGE smoke tests
          runDAST: false               # DAST covered by DEV and QA stages
