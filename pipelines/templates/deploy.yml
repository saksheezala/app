# =============================================================================
# templates/deploy.yml
# Reusable deployment template — used by ALL environment deploy stages.
#
# Uses Azure DevOps 'deployment' job (not regular 'job') so that:
#   1. Deployment is tracked in the Environments tab in Azure DevOps
#   2. Manual Approval checks on 'stage' and 'prod' environments pause here
#   3. Deployment history is maintained per environment
#
# Current deploy steps are PLACEHOLDERS.
# Replace the SSH script block with your actual deployment method when
# servers are provisioned (SSH + docker-compose, kubectl, Azure Web App, etc.)
# =============================================================================

parameters:
  - name: environmentName
    type: string        # Must match the Environment name in Azure DevOps exactly
  - name: displayName
    type: string        # Human-readable label (DEV, QA, UAT, STAGE, PROD)
  - name: frontendImage
    type: string
  - name: backendImage
    type: string
  - name: tag
    type: string

jobs:
  - deployment: Deploy_${{ parameters.displayName }}
    displayName: 'Deploy to ${{ parameters.displayName }}'
    # 'environment' links this job to an Azure DevOps Environment.
    # For 'stage' and 'prod': add an "Approvals and checks → Approvals" rule
    # in Azure DevOps → Pipelines → Environments → [stage/prod] → ⚙️ Approvals.
    # The pipeline will PAUSE here and email approvers. Nothing runs until approved.
    environment: '${{ parameters.environmentName }}'
    strategy:
      runOnce:
        deploy:
          steps:

            - script: |
                echo "╔══════════════════════════════════════════════════════╗"
                echo "║  Deploying to : ${{ parameters.displayName }}"
                echo "║  Build ID     : $(Build.BuildId)"
                echo "║  Frontend     : ${{ parameters.frontendImage }}:${{ parameters.tag }}"
                echo "║  Backend      : ${{ parameters.backendImage }}:${{ parameters.tag }}"
                echo "║  Triggered by : $(Build.RequestedFor)"
                echo "║  Branch       : $(Build.SourceBranchName)"
                echo "╚══════════════════════════════════════════════════════╝"
              displayName: 'Print deployment info'

            # ─────────────────────────────────────────────────────────────────
            # PLACEHOLDER: Replace this block with your actual deploy commands.
            #
            # Example A — SSH + docker compose (current setup):
            #   - task: SSH@0
            #     inputs:
            #       sshEndpoint: 'ssh-${{ parameters.environmentName }}'
            #       runOptions: 'inline'
            #       inline: |
            #         docker pull ${{ parameters.frontendImage }}:${{ parameters.tag }}
            #         docker pull ${{ parameters.backendImage }}:${{ parameters.tag }}
            #         IMAGE_TAG=${{ parameters.tag }} docker compose -f /opt/app/docker-compose.yml up -d
            #
            # Example B — Azure Web App Container:
            #   - task: AzureWebAppContainer@1
            #     inputs:
            #       azureSubscription: 'azure-arm-connection'
            #       appName: 'myapp-${{ parameters.environmentName }}'
            #       containers: |
            #         ${{ parameters.frontendImage }}:${{ parameters.tag }}
            #         ${{ parameters.backendImage }}:${{ parameters.tag }}
            #
            # Example C — kubectl (Kubernetes):
            #   - task: KubernetesManifest@0
            #     inputs:
            #       action: 'deploy'
            #       kubernetesServiceConnection: 'k8s-${{ parameters.environmentName }}'
            #       manifests: 'k8s/${{ parameters.environmentName }}/*.yml'
            #       containers: |
            #         ${{ parameters.frontendImage }}:${{ parameters.tag }}
            #         ${{ parameters.backendImage }}:${{ parameters.tag }}
            # ─────────────────────────────────────────────────────────────────
            - script: |
                echo "[PLACEHOLDER] Would deploy to ${{ parameters.displayName }} server here."
                echo ""
                echo "Commands to run on the server:"
                echo "  docker pull ${{ parameters.frontendImage }}:${{ parameters.tag }}"
                echo "  docker pull ${{ parameters.backendImage }}:${{ parameters.tag }}"
                echo "  docker compose up -d"
                echo ""
                echo "✅ Deployment step placeholder — wire up SSH/AzureWebApp/kubectl when servers are ready."
              displayName: 'Deploy containers to ${{ parameters.displayName }} [PLACEHOLDER]'

            - script: |
                echo "✅ Deployment to ${{ parameters.displayName }} complete."
                echo "   Image tag $(Build.BuildId) is now LIVE."
              displayName: 'Deployment complete'
