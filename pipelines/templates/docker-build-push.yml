# =============================================================================
# templates/docker-build-push.yml
# Reusable Docker build + push template.
# Builds BOTH frontend and backend images in parallel jobs.
# Tags both images with Build.BuildId — immutable, unique per pipeline run.
#
# Authentication: Uses Azure DevOps Docker Registry Service Connection.
# No credentials in YAML — all secrets managed by Azure DevOps.
#
# Why two separate jobs (not one)?
#   Frontend requires a VITE_API_URL build-arg baked into the JS bundle at
#   build time. Backend has no such build-arg. Merging them into one job
#   would not simplify the steps, just hide the distinction.
# =============================================================================

parameters:
  - name: frontendImage
    type: string
  - name: backendImage
    type: string
  - name: tag
    type: string
  - name: dockerHubConnection
    type: string
  - name: viteApiUrl
    type: string
    default: 'https://api.yourapp.com'

jobs:

  # ── Build & Push Backend ──────────────────────────────────────────────────
  - job: Build_Push_Backend
    displayName: 'Backend — Build & Push :$(Build.BuildId)'
    steps:

      - script: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " Backend Build"
          echo " Image : ${{ parameters.backendImage }}:${{ parameters.tag }}"
          echo " Commit: $(Build.SourceVersion)"
          echo " Branch: $(Build.SourceBranchName)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        displayName: 'Print build info'

      - task: Docker@2
        displayName: 'Build backend image'
        inputs:
          command: 'build'
          repository: '${{ parameters.backendImage }}'
          dockerfile: 'backend/Dockerfile'
          buildContext: 'backend'
          containerRegistry: '${{ parameters.dockerHubConnection }}'
          tags: '${{ parameters.tag }}'
          arguments: >
            --label "org.opencontainers.image.revision=$(Build.SourceVersion)"
            --label "org.opencontainers.image.created=$(Build.QueueTime)"
            --label "build.id=$(Build.BuildId)"

      # ── Trivy Image Scan (Backend) ────────────────────────────────────────
      # Trivy is a static vulnerability scanner for container images.
      # It scans the locally built image BEFORE it is pushed to the registry.
      # This is a static analysis step — it does not require the image to exist
      # on Docker Hub. It fails the pipeline on HIGH or CRITICAL CVEs.
      # Trivy is not pre-installed on Microsoft-hosted agents, so we install it.
      - script: |
          echo "Installing Trivy..."
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy
          echo "Trivy version: $(trivy --version)"
        displayName: 'Install Trivy'

      - script: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " Scanning backend image for vulnerabilities..."
          echo " Image: ${{ parameters.backendImage }}:${{ parameters.tag }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --no-progress \
            --format table \
            "${{ parameters.backendImage }}:${{ parameters.tag }}"
        displayName: 'Trivy scan — backend image (HIGH/CRITICAL fail)'

      - task: Docker@2
        displayName: 'Push backend image'
        inputs:
          command: 'push'
          repository: '${{ parameters.backendImage }}'
          containerRegistry: '${{ parameters.dockerHubConnection }}'
          tags: '${{ parameters.tag }}'

      # Note: This is a static confirmation step — it echoes the expected image
      # tag but cannot verify the image actually exists on the registry hub.
      # Use the Docker Hub API or a subsequent pull/inspect step for true verification.
      - script: |
          echo "✅ Backend push initiated: ${{ parameters.backendImage }}:${{ parameters.tag }}"
          echo "   (Static confirmation — verifies the push task ran, not registry availability)"
        displayName: 'Confirm push (static)'

  # ── Build & Push Frontend ─────────────────────────────────────────────────
  - job: Build_Push_Frontend
    displayName: 'Frontend — Build & Push :$(Build.BuildId)'
    steps:

      - script: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " Frontend Build"
          echo " Image  : ${{ parameters.frontendImage }}:${{ parameters.tag }}"
          echo " API URL: ${{ parameters.viteApiUrl }}"
          echo " Commit : $(Build.SourceVersion)"
          echo " Branch : $(Build.SourceBranchName)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        displayName: 'Print build info'

      - task: Docker@2
        displayName: 'Build frontend image'
        inputs:
          command: 'build'
          repository: '${{ parameters.frontendImage }}'
          dockerfile: 'frontend/Dockerfile'
          buildContext: 'frontend'
          containerRegistry: '${{ parameters.dockerHubConnection }}'
          tags: '${{ parameters.tag }}'
          # VITE_API_URL is baked into the JS bundle at build time by Vite.
          # Set the correct URL per branch via Azure DevOps variable groups.
          arguments: >
            --build-arg VITE_API_URL=${{ parameters.viteApiUrl }}
            --label "org.opencontainers.image.revision=$(Build.SourceVersion)"
            --label "org.opencontainers.image.created=$(Build.QueueTime)"
            --label "build.id=$(Build.BuildId)"

      # ── Trivy Image Scan (Frontend) ───────────────────────────────────────
      # Same static scan as backend — runs on the locally built image before push.
      # Trivy installation is repeated per job since jobs run on isolated agents.
      - script: |
          echo "Installing Trivy..."
          sudo apt-get update -qq
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy
          echo "Trivy version: $(trivy --version)"
        displayName: 'Install Trivy'

      - script: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo " Scanning frontend image for vulnerabilities..."
          echo " Image: ${{ parameters.frontendImage }}:${{ parameters.tag }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --no-progress \
            --format table \
            "${{ parameters.frontendImage }}:${{ parameters.tag }}"
        displayName: 'Trivy scan — frontend image (HIGH/CRITICAL fail)'

      - task: Docker@2
        displayName: 'Push frontend image'
        inputs:
          command: 'push'
          repository: '${{ parameters.frontendImage }}'
          containerRegistry: '${{ parameters.dockerHubConnection }}'
          tags: '${{ parameters.tag }}'

      # Note: Static confirmation — echoes expected tag, cannot verify registry availability.
      - script: |
          echo "✅ Frontend push initiated: ${{ parameters.frontendImage }}:${{ parameters.tag }}"
          echo "   (Static confirmation — verifies the push task ran, not registry availability)"
        displayName: 'Confirm push (static)'
